name: Upload SciTech Short

on:
  schedule:
    - cron: '30 2 * * *'
    - cron: '30 12 * * *'
  workflow_dispatch:

jobs:
  upload-short:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          GROQ_API_KEY: "not_needed"
        run: |
          cd scripts
          python run_pipeline.py

      - name: Upload video artifact (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: short-video-${{ github.run_id }}
          path: scripts/short.mp4
          retention-days: 3

      - name: Keep workflow active
        run: echo "Ran at $(date)" >> workflow_log.txt

      - name: Commit activity log
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add workflow_log.txt
          git commit -m "chore: keep workflow active [skip ci]" || echo "Nothing to commit"
          git push || echo "Push failed"
